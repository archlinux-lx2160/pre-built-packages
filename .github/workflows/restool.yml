name: Build and release packages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-image:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build and cache Docker image
        uses: ./.github/actions/archlinux-docker
        with:
          run: "true"

  create-release:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Create release
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Packages $(date +%Y-%m-%d\ %H:%M)" \
            --notes "Automated build from commit ${{ github.sha }}"

  build-packages:
    if: false
    needs: [build-image, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_repo: https://github.com/archlinux-lx2160/restool
            package_name: restool
          #- package_repo: https://github.com/archlinux-lx2160/linux-aarch64-lx2160
          #  package_name: linux-aarch64-lx2160
          - package_repo: https://aur.archlinux.org/zfs-dkms.git
            package_name: zfs-dkms
            pgp_keys: "4F3BA9AB6D1F8D683DC2DFB56AD860EED4598027 C33DF142657ED1F7C328A2960AB9E991C6AF658B"
          - package_repo: https://aur.archlinux.org/zfs-utils.git
            package_name: zfs-utils
            pgp_keys: "4F3BA9AB6D1F8D683DC2DFB56AD860EED4598027 C33DF142657ED1F7C328A2960AB9E991C6AF658B"
    uses: ./.github/workflows/build-package.yml
    with:
      package_repo: ${{ matrix.package_repo }}
      package_name: ${{ matrix.package_name }}
      release_tag: ${{ needs.create-release.outputs.tag }}
      pgp_keys: ${{ matrix.pgp_keys || '' }}
    secrets:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  build-incus-image:
    needs: [build-image]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Arch Linux ARM rootfs
        uses: ./.github/actions/archlinux-docker
        with:
          mount: |
            ${{ github.workspace }}/output:/output
          run: |
            mkdir -p /rootfs/var/lib/pacman /rootfs/etc
            pacman -r /rootfs -Sy --noconfirm base openssh
            # Configure the image
            echo "archlinux" > /rootfs/etc/hostname
            ln -sf /usr/share/zoneinfo/UTC /rootfs/etc/localtime
            systemctl --root=/rootfs enable systemd-networkd systemd-resolved sshd
            # Create metadata
            cat > /output/metadata.yaml << 'EOF'
            architecture: aarch64
            creation_date: $(date +%s)
            properties:
              description: Arch Linux ARM (aarch64)
              os: archlinux
              release: rolling
              variant: default
            EOF
            sed -i "s/\$(date +%s)/$(date +%s)/" /output/metadata.yaml
            # Pack rootfs and metadata
            tar czf /output/rootfs.tar.gz -C /rootfs .
            tar czf /output/metadata.tar.gz -C /output metadata.yaml

      - name: Upload incus image artifact
        uses: actions/upload-artifact@v5
        with:
          name: incus-image
          path: output/

  deploy-repo:
    needs: [create-release, build-incus-image]  # build-packages
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: pkg-*
          path: packages

      - name: Download Incus image artifact
        uses: actions/download-artifact@v5
        with:
          name: incus-image
          path: incus-image

      - name: Collect packages
        run: |
          mkdir -p site
          find packages -name '*.pkg.tar.*' -exec cp {} site/ \;

      - name: Build Incus simplestreams
        run: |
          mkdir -p site/incus/streams/v1 site/incus/images
          cp incus-image/rootfs.tar.gz site/incus/images/
          cp incus-image/metadata.tar.gz site/incus/images/
          ROOTFS_SHA256=$(sha256sum site/incus/images/rootfs.tar.gz | cut -d' ' -f1)
          ROOTFS_SIZE=$(stat -c%s site/incus/images/rootfs.tar.gz)
          META_SHA256=$(sha256sum site/incus/images/metadata.tar.gz | cut -d' ' -f1)
          META_SIZE=$(stat -c%s site/incus/images/metadata.tar.gz)
          FINGERPRINT=$ROOTFS_SHA256
          DATE=$(date +%Y%m%d_%H:%M)

          cat > site/incus/streams/v1/index.json << EOF
          {
            "index": {
              "images": {
                "datatype": "image-downloads",
                "path": "streams/v1/images.json",
                "format": "products:1.0",
                "products": ["archlinux:aarch64:default"]
              }
            },
            "format": "index:1.0"
          }
          EOF

          cat > site/incus/streams/v1/images.json << EOF
          {
            "content_id": "images",
            "datatype": "image-downloads",
            "format": "products:1.0",
            "products": {
              "archlinux:aarch64:default": {
                "aliases": "archlinux/aarch64",
                "arch": "aarch64",
                "os": "archlinux",
                "release": "rolling",
                "variant": "default",
                "versions": {
                  "$DATE": {
                    "items": {
                      "root.tar.gz": {
                        "ftype": "root.tar.gz",
                        "sha256": "$ROOTFS_SHA256",
                        "size": $ROOTFS_SIZE,
                        "path": "images/rootfs.tar.gz"
                      },
                      "incus.tar.gz": {
                        "ftype": "incus.tar.gz",
                        "sha256": "$META_SHA256",
                        "size": $META_SIZE,
                        "path": "images/metadata.tar.gz"
                      }
                    }
                  }
                }
              }
            }
          }
          EOF

      - name: Write GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" > /tmp/gpg-private.key

      - name: Build pacman repo database
        uses: ./.github/actions/archlinux-docker
        with:
          mount: |
            ${{ github.workspace }}/site:/site
            /tmp/gpg-private.key:/tmp/gpg-private.key:ro
          run: |
            gpg --batch --import /tmp/gpg-private.key
            gpg --export --armor > /site/lx2160.gpg
            cd /site && find . -maxdepth 1 -name "*.pkg.tar.*" \! -name "*.sig" -exec repo-add --sign lx2160.db.tar.gz {} +

      - name: Generate redirects and clean up
        env:
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          cd site
          for pkg in *.pkg.tar.*; do
            [[ "$pkg" == lx2160.db* ]] && continue
            [[ "$pkg" == lx2160.files* ]] && continue
            echo "/$pkg https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/$pkg 302" >> _redirects
          done
          find . -name '*.pkg.tar.*' ! -name 'lx2160.db*' ! -name 'lx2160.files*' -delete
          cat _redirects

      - name: Deploy to cf-pages branch
        run: |
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git clone --branch cf-pages --depth 1 "$REPO_URL" deploy || {
            git init deploy
            git -C deploy checkout -b cf-pages
            git -C deploy remote add origin "$REPO_URL"
          }
          # Generate index.html
          cd site
          cat > index.html << 'HEADER'
          <!DOCTYPE html>
          <html><head><title>LX2160 Pacman Repository</title></head>
          <body><h1>LX2160 Pacman Repository</h1>
          <h2>Setup</h2>
          <p>Import the signing key:</p>
          <pre>curl -s https://archlinux-lx2160.yxio.net/lx2160.gpg | sudo pacman-key --add -
          sudo pacman-key --lsign-key KEY_ID_PLACEHOLDER</pre>
          <p>Add to <code>/etc/pacman.conf</code>:</p>
          <pre>[lx2160]
          Server = https://archlinux-lx2160.yxio.net</pre>
          <h2>Incus Image</h2>
          <pre>incus remote add archlinux-aarch64 https://archlinux-lx2160.yxio.net/incus --protocol simplestreams
          incus launch archlinux-aarch64:archlinux/aarch64 mycontainer</pre>
          <h2>Packages</h2><ul>
          HEADER
          KEY_ID=$(gpg --show-keys --with-colons lx2160.gpg | awk -F: '$1=="fpr"{print $10; exit}')
          sed -i "s/KEY_ID_PLACEHOLDER/$KEY_ID/" index.html
          for f in lx2160.db* lx2160.files*; do
            [ -f "$f" ] && echo "<li><a href=\"$f\">$f</a></li>" >> index.html
          done
          grep -oP '^/\K[^ ]+' _redirects 2>/dev/null | while read pkg; do
            echo "<li><a href=\"$pkg\">$pkg</a></li>" >> index.html
          done
          echo "</ul></body></html>" >> index.html
          cd ..
          cp -f site/* deploy/
          cd deploy
          git add -A
          git -c user.name="github-actions" -c user.email="github-actions@github.com" \
            commit -m "Update pacman repo"
          git push origin cf-pages