name: Build and release packages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-image:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build and cache Docker image
        uses: ./.github/actions/archlinux-docker
        with:
          run: "true"

  create-release:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Create release
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Packages $(date +%Y-%m-%d\ %H:%M)" \
            --notes "Automated build from commit ${{ github.sha }}"

  build-packages:
    if: false
    needs: [build-image, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_repo: https://github.com/archlinux-lx2160/restool
            package_name: restool
          #- package_repo: https://github.com/archlinux-lx2160/linux-aarch64-lx2160
          #  package_name: linux-aarch64-lx2160
          - package_repo: https://aur.archlinux.org/zfs-dkms.git
            package_name: zfs-dkms
            pgp_keys: "4F3BA9AB6D1F8D683DC2DFB56AD860EED4598027 C33DF142657ED1F7C328A2960AB9E991C6AF658B"
          - package_repo: https://aur.archlinux.org/zfs-utils.git
            package_name: zfs-utils
            pgp_keys: "4F3BA9AB6D1F8D683DC2DFB56AD860EED4598027 C33DF142657ED1F7C328A2960AB9E991C6AF658B"
    uses: ./.github/workflows/build-package.yml
    with:
      package_repo: ${{ matrix.package_repo }}
      package_name: ${{ matrix.package_name }}
      release_tag: ${{ needs.create-release.outputs.tag }}
      pgp_keys: ${{ matrix.pgp_keys || '' }}
    secrets:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  build-incus-image:
    needs: [build-image]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Arch Linux ARM rootfs
        uses: ./.github/actions/archlinux-docker
        with:
          mount: |
            ${{ github.workspace }}/output:/output
          run: |
            mkdir -p /rootfs/var/lib/pacman /rootfs/etc
            pacman -r /rootfs -Sy --noconfirm base openssh
            # Configure the image
            echo "archlinux" > /rootfs/etc/hostname
            ln -sf /usr/share/zoneinfo/UTC /rootfs/etc/localtime
            systemctl --root=/rootfs enable systemd-networkd systemd-resolved sshd
            # Create metadata
            SERIAL=$(date +%Y%m%d_%H:%M)
            cat > /output/metadata.yaml << EOF
            architecture: aarch64
            creation_date: $(date +%s)
            properties:
              architecture: aarch64
              description: Archlinux aarch64 ($SERIAL)
              name: archlinux--aarch64-default-$SERIAL
              os: archlinux
              release: ""
              serial: "$SERIAL"
              variant: default
            templates:
              /etc/hosts:
                when:
                - create
                - copy
                create_only: false
                template: hosts.tpl
                properties: {}
            EOF
            mkdir -p /output/templates
            cat > /output/templates/hosts.tpl << 'EOF'
            127.0.1.1    {{ container.name }}
            # Static table lookup for hostnames.
            # See hosts(5) for details.
            127.0.0.1        localhost
            ::1              localhost
            EOF
            # Pack rootfs and metadata
            tar czf /output/rootfs.tar.gz -C /rootfs .
            tar czf /output/metadata.tar.gz -C /output metadata.yaml templates

      - name: Upload incus image artifact
        uses: actions/upload-artifact@v5
        with:
          name: incus-image
          path: output/

  upload-release:
    needs: [create-release, build-incus-image]  # build-packages
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Download Incus image artifact
        uses: actions/download-artifact@v5
        with:
          name: incus-image
          path: incus-image

      - name: Upload incus image to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            incus-image/rootfs.tar.gz \
            incus-image/metadata.tar.gz \
            --repo "${{ github.repository }}"

  deploy-site:
    needs: [create-release, upload-release, build-image]  # build-packages
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: pkg-*
          path: packages
          merge-multiple: true

      - name: Download Incus image artifact
        uses: actions/download-artifact@v5
        with:
          name: incus-image
          path: incus-image

      - name: Initial setup
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" > /tmp/gpg-private.key
          mkdir -p site packages

      - name: Build pacman repo database and export GPG public key
        uses: ./.github/actions/archlinux-docker
        with:
          mount: |
            ${{ github.workspace }}/packages:/packages:ro
            ${{ github.workspace }}/site:/site
            /tmp/gpg-private.key:/tmp/gpg-private.key:ro
          run: |
            gpg --batch --import /tmp/gpg-private.key
            mkdir -p /site
            gpg --export --armor > /site/lx2160.gpg
            find /packages -maxdepth 1 -name "*.pkg.tar.*" \! -name "*.sig" -exec repo-add --sign /site/lx2160.db.tar.gz {} +

      - name: Build site
        env:
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/download
        run: |
          mkdir -p site/incus/streams/v1
          GPG_KEY_ID=$(gpg --show-keys --with-colons site/lx2160.gpg | awk -F: '$1=="fpr"{print $10; exit}')

          # Redirects for packages
          find packages -maxdepth 1 -name '*.pkg.tar.*' \! -name '*.sig' | while read -r f; do
            pkg=$(basename "$f")
            echo "/$pkg $RELEASE_URL/$RELEASE_TAG/$pkg 302"
          done > site/_redirects

          # Redirects for incus images
          echo "/incus/images/rootfs.tar.gz $RELEASE_URL/$RELEASE_TAG/rootfs.tar.gz 302" >> site/_redirects
          echo "/incus/images/metadata.tar.gz $RELEASE_URL/$RELEASE_TAG/metadata.tar.gz 302" >> site/_redirects
          cat site/_redirects

          # Incus simplestreams metadata
          ROOTFS_SHA256=$(sha256sum incus-image/rootfs.tar.gz | cut -d' ' -f1)
          ROOTFS_SIZE=$(stat -c%s incus-image/rootfs.tar.gz)
          META_SHA256=$(sha256sum incus-image/metadata.tar.gz | cut -d' ' -f1)
          META_SIZE=$(stat -c%s incus-image/metadata.tar.gz)
          DATE=$(date +%Y%m%d_%H:%M)

          cat > site/incus/streams/v1/index.json << EOF
          {
            "index": {
              "images": {
                "datatype": "image-downloads",
                "path": "streams/v1/images.json",
                "format": "products:1.0",
                "products": ["archlinux:current:arm64:default"]
              }
            },
            "format": "index:1.0"
          }
          EOF

          cat > site/incus/streams/v1/images.json << EOF
          {
            "content_id": "images",
            "datatype": "image-downloads",
            "format": "products:1.0",
            "products": {
              "archlinux:current:arm64:default": {
                "aliases": "archlinux/current/default,archlinux/current,archlinux",
                "arch": "arm64",
                "os": "Archlinux",
                "release": "current",
                "release_title": "current",
                "variant": "default",
                "versions": {
                  "$DATE": {
                    "items": {
                      "root.tar.gz": {
                        "ftype": "root.tar.gz",
                        "sha256": "$ROOTFS_SHA256",
                        "size": $ROOTFS_SIZE,
                        "path": "images/rootfs.tar.gz"
                      },
                      "incus.tar.gz": {
                        "ftype": "incus.tar.gz",
                        "sha256": "$META_SHA256",
                        "size": $META_SIZE,
                        "path": "images/metadata.tar.gz"
                      }
                    }
                  }
                }
              }
            }
          }
          EOF

          # Generate index.html
          cat > site/index.html <<EOF
          <!DOCTYPE html>
          <html><head><title>LX2160 Pacman Repository</title></head>
          <body><h1>LX2160 Pacman Repository</h1>
          <h2>Setup</h2>
          <p>Import the signing key:</p>
          <pre>curl -s https://archlinux-lx2160.yxio.net/lx2160.gpg | sudo pacman-key --add -
          sudo pacman-key --lsign-key $GPG_KEY_ID</pre>
          <p>Add to <code>/etc/pacman.conf</code>:</p>
          <pre>[lx2160]
          Server = https://archlinux-lx2160.yxio.net</pre>
          <h2>Incus Image</h2>
          <pre>incus remote add archlinux-aarch64 https://archlinux-lx2160.yxio.net/incus --protocol simplestreams
          incus launch archlinux-aarch64:archlinux mycontainer</pre>
          <h2>Packages</h2><ul>
          EOF
          for f in site/lx2160.db* site/lx2160.files*; do
            [ -f "$f" ] && echo "<li><a href=\"$(basename "$f")\">$(basename "$f")</a></li>" >> site/index.html
          done
          grep -oP '^/\K[^ ]+' site/_redirects 2>/dev/null | while read pkg; do
            echo "<li><a href=\"$pkg\">$pkg</a></li>" >> site/index.html
          done
          echo "</ul></body></html>" >> site/index.html

      - name: Deploy to cf-pages branch
        run: |
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git clone --branch cf-pages --depth 1 "$REPO_URL" deploy || {
            git init deploy
            git -C deploy checkout -b cf-pages
            git -C deploy remote add origin "$REPO_URL"
          }
          cp -rf site/* deploy/
          cd deploy
          git add -A
          git -c user.name="github-actions" -c user.email="github-actions@github.com" \
            commit -m "Update pacman repo"
          git push origin cf-pages