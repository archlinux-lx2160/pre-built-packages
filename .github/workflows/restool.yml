name: Build and release packages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-image:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Cache Docker image
        uses: actions/cache@v4
        id: docker-cache
        with:
          path: /tmp/archlinux-aarch64.tar.zst
          key: archlinux-aarch64-v1

      - name: Build Arch Linux ARM Docker image
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          curl -LO http://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz
          cat <<'DOCKERFILE' > Dockerfile
          FROM scratch AS base
          ADD ArchLinuxARM-aarch64-latest.tar.gz /
          RUN pacman-key --init && pacman-key --populate archlinuxarm
          RUN sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf
          RUN pacman -Rdd --noconfirm $(pacman -Qq | grep '^linux') 2>/dev/null || true
          RUN pacman -Syu --noconfirm base-devel git
          RUN sed -i '0,/if (( EUID == 0 ))/s/if (( EUID == 0 ))/if false/' /usr/bin/makepkg
          RUN pacman -Scc --noconfirm && rm -rf /var/log/* /tmp/* /var/cache/pacman/pkg/*
          FROM scratch
          COPY --from=base / /
          DOCKERFILE
          docker build -t archlinux-aarch64 .
          docker images archlinux-aarch64
          docker save archlinux-aarch64 | zstd -T0 -o /tmp/archlinux-aarch64.tar.zst
          ls -lh /tmp/archlinux-aarch64.tar.zst

  create-release:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Create release
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Packages $(date +%Y-%m-%d\ %H:%M)" \
            --notes "Automated build from commit ${{ github.sha }}"

  build-packages:
    needs: [build-image, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_repo: https://github.com/archlinux-lx2160/restool
            package_name: restool
          #- package_repo: https://github.com/archlinux-lx2160/linux-aarch64-lx2160
          #  package_name: linux-aarch64-lx2160
          - package_repo: https://aur.archlinux.org/zfs-dkms.git
            package_name: zfs-dkms
            pgp_keys: "4F3BA9AB6D1F8D683DC2DFB56AD860EED4598027 C33DF142657ED1F7C328A2960AB9E991C6AF658B"
    uses: ./.github/workflows/build-package.yml
    with:
      package_repo: ${{ matrix.package_repo }}
      package_name: ${{ matrix.package_name }}
      release_tag: ${{ needs.create-release.outputs.tag }}
      pgp_keys: ${{ matrix.pgp_keys || '' }}

  deploy-repo:
    needs: [create-release, build-packages]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages

      - name: Build pacman repo database
        run: |
          mkdir -p site
          find packages -name '*.pkg.tar.*' -exec cp {} site/ \;
          cd site
          repo-add lx2160.db.tar.gz *.pkg.tar.*

      - name: Generate redirects
        env:
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          cd site
          for pkg in *.pkg.tar.*; do
            [[ "$pkg" == lx2160.db* ]] && continue
            [[ "$pkg" == lx2160.files* ]] && continue
            echo "/$pkg https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/$pkg 302" >> _redirects
          done
          find . -name '*.pkg.tar.*' ! -name 'lx2160.db*' ! -name 'lx2160.files*' -delete
          cat _redirects

      - name: Deploy to cf-pages branch
        run: |
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git clone --branch cf-pages --depth 1 "$REPO_URL" deploy || {
            git init deploy
            git -C deploy checkout -b cf-pages
            git -C deploy remote add origin "$REPO_URL"
          }
          cp -f site/* deploy/
          cd deploy
          git add -A
          git -c user.name="github-actions" -c user.email="github-actions@github.com" \
            commit -m "Update pacman repo"
          git push origin cf-pages