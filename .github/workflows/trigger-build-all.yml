name: Build and release packages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    # Reusable package build/publish pipeline maintained upstream. It reads the
    # package list from .github/packages.yml in THIS repo, builds them, and
    # publishes the repo DB + .gpg + packages to a GitHub release (pending -> latest).
    uses: tehrengruber/arch-pre-built-packages/.github/workflows/build-all.yml@v0.1
    with:
      runner: ubuntu-24.04-arm
      repo_db_name: lx2160
    secrets:
      # Explicit (not `inherit`): caller and reusable workflow are different owners.
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  build-incus-image:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Build Arch Linux ARM rootfs
        uses: tehrengruber/arch-pre-built-packages/.github/actions/archlinux-docker@v0.1
        with:
          mount: |
            ${{ github.workspace }}/output:/output
          run: |
            mkdir -p /rootfs/var/lib/pacman /rootfs/etc
            pacman -r /rootfs -Sy --noconfirm base openssh dhclient
            # Configure the image
            echo "archlinux" > /rootfs/etc/hostname
            ln -sf /usr/share/zoneinfo/UTC /rootfs/etc/localtime
            systemctl --root=/rootfs enable systemd-networkd systemd-resolved sshd
            # Create metadata
            SERIAL=$(date +%Y%m%d_%H:%M)
            cat > /output/metadata.yaml << EOF
            architecture: aarch64
            creation_date: $(date +%s)
            properties:
              architecture: aarch64
              description: Archlinux aarch64 ($SERIAL)
              name: archlinux--aarch64-default-$SERIAL
              os: archlinux
              release: ""
              serial: "$SERIAL"
              variant: default
            templates:
              /etc/hosts:
                when:
                - create
                - copy
                create_only: false
                template: hosts.tpl
                properties: {}
            EOF
            mkdir -p /output/templates
            cat > /output/templates/hosts.tpl << 'EOF'
            127.0.1.1    {{ container.name }}
            # Static table lookup for hostnames.
            # See hosts(5) for details.
            127.0.0.1        localhost
            ::1              localhost
            EOF
            # Pack rootfs and metadata
            tar cJf /output/rootfs.tar.xz -C /rootfs .
            tar cJf /output/metadata.tar.xz -C /output metadata.yaml templates

      - name: Upload incus image artifact
        uses: actions/upload-artifact@v5
        with:
          name: incus-image
          path: output/

  deploy-incus:
    needs: [build, build-incus-image]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Download Incus image artifact
        uses: actions/download-artifact@v5
        with:
          name: incus-image
          path: incus-image

      - name: Attach Incus image to pending release
        id: attach
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # The reusable build runs in this same workflow run, so its pending
          # release is tagged pending-<final>-<run_id>. Upload the incus binaries
          # there so `promote-release` carries them into `latest` alongside packages.
          TEMP_TAG=$(gh release list --repo "$REPO" --json tagName \
            --jq ".[] | select(.tagName | startswith(\"pending-\")) | select(.tagName | endswith(\"-$RUN_ID\")) | .tagName" \
            | head -1)
          if [ -z "$TEMP_TAG" ]; then
            echo "No pending release for run $RUN_ID — skipping incus deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Uploading incus image to $TEMP_TAG"
          gh release upload "$TEMP_TAG" \
            incus-image/rootfs.tar.xz \
            incus-image/metadata.tar.xz \
            --repo "$REPO" --clobber

      - name: Build simplestreams site
        if: steps.attach.outputs.skip != 'true'
        env:
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/download
        run: |
          mkdir -p site/incus/streams/v1

          # Cloudflare serves only the incus simplestreams metadata; the image
          # binaries are redirected to the stable `latest` GitHub release.
          cat > site/_redirects << EOF
          /incus/images/rootfs.tar.xz $RELEASE_URL/latest/rootfs.tar.xz 302
          /incus/images/metadata.tar.xz $RELEASE_URL/latest/metadata.tar.xz 302
          EOF
          cat site/_redirects

          ROOTFS_SHA256=$(sha256sum incus-image/rootfs.tar.xz | cut -d' ' -f1)
          ROOTFS_SIZE=$(stat -c%s incus-image/rootfs.tar.xz)
          META_SHA256=$(sha256sum incus-image/metadata.tar.xz | cut -d' ' -f1)
          META_SIZE=$(stat -c%s incus-image/metadata.tar.xz)
          COMBINED_SHA256=$(cat incus-image/metadata.tar.xz incus-image/rootfs.tar.xz | sha256sum | cut -d' ' -f1)
          DATE=$(date +%Y%m%d_%H:%M)

          cat > site/incus/streams/v1/index.json << EOF
          {
            "index": {
              "images": {
                "datatype": "image-downloads",
                "path": "streams/v1/images.json",
                "format": "products:1.0",
                "products": ["archlinux:current:arm64:default"]
              }
            },
            "format": "index:1.0"
          }
          EOF

          cat > site/incus/streams/v1/images.json << EOF
          {
            "content_id": "images",
            "datatype": "image-downloads",
            "format": "products:1.0",
            "products": {
              "archlinux:current:arm64:default": {
                "aliases": "archlinux/current/default,archlinux/current,archlinux",
                "arch": "arm64",
                "os": "Archlinux",
                "release": "current",
                "release_title": "current",
                "variant": "default",
                "versions": {
                  "$DATE": {
                    "items": {
                      "root.tar.xz": {
                        "ftype": "root.tar.xz",
                        "sha256": "$ROOTFS_SHA256",
                        "size": $ROOTFS_SIZE,
                        "path": "images/rootfs.tar.xz",
                        "combined_sha256": "$COMBINED_SHA256",
                        "combined_rootxz_sha256": "$COMBINED_SHA256"
                      },
                      "incus.tar.xz": {
                        "ftype": "incus.tar.xz",
                        "sha256": "$META_SHA256",
                        "size": $META_SIZE,
                        "path": "images/metadata.tar.xz",
                        "combined_sha256": "$COMBINED_SHA256",
                        "combined_rootxz_sha256": "$COMBINED_SHA256"
                      }
                    }
                  }
                }
              }
            }
          }
          EOF

          # Minimal landing page (packages now live on GitHub releases)
          cat > site/index.html << EOF
          <!DOCTYPE html>
          <html><head><title>LX2160 Arch Linux ARM</title></head>
          <body><h1>LX2160 Arch Linux ARM</h1>
          <h2>Pacman Repository</h2>
          <p>Packages are published as GitHub release assets. Add to <code>/etc/pacman.conf</code>:</p>
          <pre>[lx2160]
          Server = $RELEASE_URL/latest</pre>
          <h2>Incus Image</h2>
          <pre>incus remote add archlinux-aarch64 https://archlinux-lx2160.yxio.net/incus --protocol simplestreams
          incus launch archlinux-aarch64:archlinux mycontainer</pre>
          </body></html>
          EOF

      - name: Deploy to cf-pages branch
        if: steps.attach.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git clone --branch cf-pages --depth 1 "$REPO_URL" deploy || {
            git init deploy
            git -C deploy checkout -b cf-pages
            git -C deploy remote add origin "$REPO_URL"
          }
          # Wipe stale content (old package DBs/redirects) — Cloudflare is incus-only now
          find deploy -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -rf site/* deploy/
          cd deploy
          git add -A
          git -c user.name="github-actions" -c user.email="github-actions@github.com" \
            commit -m "Update incus simplestreams" --allow-empty
          git push origin cf-pages
